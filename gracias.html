<style>
  body { background: #f8f9fa; }
  .gracias-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .gracias-box {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.10);
    padding: 50px 40px;
    max-width: 550px;
    width: 100%;
    text-align: center;
  }
  .gracias-box .check-icon {
    width: 70px;
    height: 70px;
    background: #28a745;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 25px;
  }
  .gracias-box .check-icon svg {
    width: 36px;
    height: 36px;
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .gracias-box h1 {
    font-size: 28px;
    color: #1a1a1a;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .gracias-box p {
    color: #555;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .gracias-box .highlight {
    background: #fff3cd;
    border-radius: 8px;
    padding: 14px 18px;
    color: #856404;
    font-size: 15px;
    margin-bottom: 30px;
    border-left: 4px solid #f5a623;
  }
  .gracias-box .btn-wa {
    display: inline-block;
    background: #25d366;
    color: #fff;
    padding: 13px 28px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 12px;
    transition: background 0.3s;
  }
  .gracias-box .btn-wa:hover { background: #1da851; color: #fff; }
  .gracias-box .btn-inicio {
    display: inline-block;
    background: #f5a623;
    color: #fff;
    padding: 13px 28px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    margin-left: 10px;
    transition: background 0.3s;
  }
  .gracias-box .btn-inicio:hover { background: #d4891a; color: #fff; }
  .gracias-logo { margin-bottom: 25px; }
  .gracias-logo img { max-height: 55px; width: auto; }
  @media (max-width: 500px) {
    .gracias-box { padding: 35px 20px; }
    .gracias-box .btn-inicio { margin-left: 0; margin-top: 10px; }
  }

  <div class="gracias-section">

      </div>

      </div>
      <div>
        <a href="https://api.whatsapp.com/send?phone=51967526092&text=Buen día Taxi Green Lima, acabo de enviar mi reserva y quiero confirmarla" target="_blank" class="btn-wa">

        </a>
        <a href="index.html" class="btn-inicio">Volver al Inicio</a>
      </div>
    </div>
  </div>
